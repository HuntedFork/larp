<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LARP Docs</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #1a1a2e;
      color: #e0d7c6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 0.1em;
      margin-bottom: 0.25em;
      color: #f0e6d3;
    }

    p.subtitle {
      color: #a09080;
      margin-bottom: 2.5em;
      font-style: italic;
    }

    .doc-links {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .doc-link {
      display: block;
      padding: 1.5rem 2.5rem;
      background: #2a2040;
      border: 1px solid #5a4a7a;
      border-radius: 8px;
      text-decoration: none;
      color: #e0d7c6;
      font-size: 1.2rem;
      letter-spacing: 0.05em;
      transition: background 0.2s, border-color 0.2s;
      text-align: center;
    }

    .doc-link:hover {
      background: #3a3060;
      border-color: #9a7abf;
    }

    .doc-link .icon {
      display: block;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>⚔️ LARP Reference Docs</h1>
  <p class="subtitle">Printable game reference sheets</p>
  <nav class="doc-links">
    <a class="doc-link" href="docs/potions/">
      <span class="icon">🧪</span>
      Potions
    </a>
    <a class="doc-link" href="docs/mishaps/">
      <span class="icon">💥</span>
      Mishaps
    </a>
  </nav>
</body>
</html>
